name: Validate values schema json
on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install schema generator
        run: go install github.com/losisin/helm-values-schema-json/v2@v2.4.0
      - name: Regenerate schema
        working-directory: charts/permify
        run: helm-values-schema-json -f values.yaml -o values.schema.json
      - name: Fail if schema is stale
        run: |
          if ! git diff --exit-code charts/permify/values.schema.json; then
            echo "::error::charts/permify/values.schema.json is out of date with values.yaml."
            echo "Regenerate locally and commit the result:"
            echo "  go install github.com/losisin/helm-values-schema-json/v2@v2.4.0"
            echo "  cd charts/permify && helm-values-schema-json -f values.yaml -o values.schema.json"
            exit 1
          fi
