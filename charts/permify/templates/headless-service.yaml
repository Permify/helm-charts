{{- if .Values.app.distributed.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "permify.fullname" . }}-headless
  labels:
    {{- include "permify.labels" . | nindent 4 }}

spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: invoker
      port: {{ .Values.app.distributed.port }}
      targetPort: invoker
      protocol: TCP
  selector:
    {{- include "permify.selectorLabels" . | nindent 4 }}
{{- end }}
